
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Smart Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NumberFont';
            /* 优先使用苹果原生的超清脆数字字体 DIN Alternate，备选 Google 的 Outfit */
            src: local('DIN Alternate Bold'), local('DIN Alternate'), local('Outfit');
            unicode-range: U+0030-0039, U+002E, U+002D, U+002B; /* 0-9, \., -, \+ */
        }
        body {
            font-family: 'NumberFont', 'Outfit', 'Fredoka', 'PingFang SC', system-ui, sans-serif;
            background-color: #f0f9ff;
            user-select: none;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .shimmer {
          background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
          background-size: 200% 100%;
          animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
    </style>
<script type="importmap">
